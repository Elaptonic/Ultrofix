openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Urban Company API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: services
    description: Service catalog
  - name: providers
    description: Service providers
  - name: bookings
    description: Booking operations
  - name: profile
    description: User profile

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List all services
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"

  /services/{id}:
    get:
      operationId: getService
      tags: [services]
      summary: Get service by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /providers:
    get:
      operationId: listProviders
      tags: [providers]
      summary: List all providers
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Provider"

  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List bookings for a user
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a new booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingBody"
      responses:
        "201":
          description: Created booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get a booking by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateBooking
      tags: [bookings]
      summary: Update a booking (cancel or rate)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookingBody"
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profile/{userId}:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get user profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: upsertProfile
      tags: [profile]
      summary: Create or update user profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Service:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        category:
          type: string
        description:
          type: string
        startingPrice:
          type: integer
        rating:
          type: number
        reviewCount:
          type: integer
        duration:
          type: string
        imageKey:
          type: string
        popular:
          type: boolean
      required:
        - id
        - slug
        - name
        - category
        - description
        - startingPrice
        - rating
        - reviewCount
        - duration
        - imageKey
        - popular

    Provider:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        initials:
          type: string
        rating:
          type: number
        reviewCount:
          type: integer
        jobsCompleted:
          type: integer
        specializations:
          type: array
          items:
            type: string
        experience:
          type: string
        verified:
          type: boolean
        category:
          type: string
      required:
        - id
        - slug
        - name
        - initials
        - rating
        - reviewCount
        - jobsCompleted
        - specializations
        - experience
        - verified
        - category

    Booking:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        serviceId:
          type: integer
        serviceName:
          type: string
        providerId:
          type: integer
        providerName:
          type: string
        providerInitials:
          type: string
        date:
          type: string
        time:
          type: string
        status:
          type: string
          enum: [upcoming, completed, cancelled]
        price:
          type: integer
        address:
          type: string
        rating:
          type: ["integer", "null"]
        createdAt:
          type: string
      required:
        - id
        - userId
        - serviceId
        - serviceName
        - providerId
        - providerName
        - providerInitials
        - date
        - time
        - status
        - price
        - address
        - createdAt

    CreateBookingBody:
      type: object
      properties:
        userId:
          type: string
        serviceId:
          type: integer
        providerId:
          type: integer
        date:
          type: string
        time:
          type: string
        address:
          type: string
        price:
          type: integer
      required:
        - userId
        - serviceId
        - providerId
        - date
        - time
        - address
        - price

    UpdateBookingBody:
      type: object
      properties:
        status:
          type: string
          enum: [upcoming, completed, cancelled]
        rating:
          type: ["integer", "null"]

    UserProfile:
      type: object
      properties:
        userId:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
      required:
        - userId
        - name
        - email
        - phone
        - address

    UpsertProfileBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
      required:
        - name
        - email
        - phone
        - address
